<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeTalks - Desenvolvedores</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      src="https://kit.fontawesome.com/02eeb2401b.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style type="text/tailwindcss">
      @theme {
        --font-sans: "Syne", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
    </style>
  </head>

  <body
    class="min-h-screen flex flex-col font-sans text-white [background:radial-gradient(ellipse_70%_50%_at_5%_95%,#2a0808_0%,#150404_40%,#080508_100%)]"
  >
    <header
      class="text-white px-6 py-4 flex justify-between items-center border-b border-white/10 shrink-0"
    >
      <img class="w-28" src="img/logo.svg" />

      <nav class="flex items-center gap-6 text-sm text-white/60">
        <a href="index.html" class="hover:text-white transition-colors">
          Início
        </a>

        <a
          href="desenvolvedores.html"
          class="hover:text-white transition-colors"
        >
          Desenvolvedores
        </a>

        <a href="sobre.html" class="hover:text-white transition-colors">
          Sobre
        </a>
        <button
          onclick="logout()"
          class="text-red-400 hover:text-red-300 transition-colors cursor-pointer"
        >
          Sair
        </button>
      </nav>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-10">
      <div class="mb-8">
        <p class="font-mono text-red-400/60 text-xs mb-1">
          > explore a comunidade_
        </p>
        <h1 class="text-2xl font-bold">Conheça Desenvolvedores</h1>
        <p class="text-white/40 text-sm mt-1">
          Encontre devs, veja seus stacks e adicione aos seus contatos.
        </p>
      </div>

      <div class="flex flex-col gap-4 mb-8">
        <div
          class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus-within:border-red-500/40 transition-colors"
        >
          <i class="fa-solid fa-magnifying-glass text-white/30 text-sm"></i>
          <input
            id="search-input"
            type="text"
            placeholder="Buscar por nome ou tecnologia..."
            class="flex-1 bg-transparent text-white/90 text-sm placeholder:text-white/25 outline-none font-sans"
          />
          <button
            id="clear-btn"
            onclick="limparBusca()"
            class="hidden text-white/20 hover:text-white/60 transition-colors cursor-pointer"
          >
            <i class="fa-solid fa-xmark text-sm"></i>
          </button>
        </div>

        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-white/30 text-xs font-mono mr-1">filtrar:</span>
          <div id="filtros" class="flex gap-2 flex-wrap"></div>
          <button
            id="limpar-filtros"
            onclick="limparFiltros()"
            class="hidden font-mono text-xs text-red-400/50 hover:text-red-400 transition-colors cursor-pointer ml-1"
          >
            limpar filtros
          </button>
        </div>
      </div>

      <div class="flex items-center justify-between mb-5">
        <p id="resultado-count" class="text-white/30 text-xs font-mono"></p>

        <div class="flex items-center gap-2">
          <span class="text-white/25 text-xs font-mono">ordenar:</span>
          <select
            id="ordenar"
            onchange="aplicarFiltros()"
            class="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white/70 font-mono outline-none cursor-pointer hover:border-white/20 transition-colors"
          >
            <option value="nome">nome</option>
            <option value="contatos">mais conectados</option>
            <option value="recente">mais recentes</option>
          </select>
        </div>
      </div>

      <div
        id="devs-grid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"
      ></div>

      <div
        id="empty-state"
        class="hidden flex-col items-center justify-center py-24 text-center"
      >
        <i class="fa-solid fa-user-slash text-white/10 text-4xl mb-4"></i>
        <p class="text-white/40 text-sm">Nenhum desenvolvedor encontrado.</p>
        <button
          onclick="
            limparBusca();
            limparFiltros();
          "
          class="font-mono text-red-400/60 hover:text-red-400 text-xs mt-3 transition-colors cursor-pointer"
        >
          limpar busca
        </button>
      </div>
    </main>

    <div
      id="toast"
      class="fixed bottom-6 left-1/2 -translate-x-1/2 -translate-y-2 opacity-0 pointer-events-none flex items-center gap-2 px-4 py-2.5 rounded-xl bg-white/10 backdrop-blur-xl border border-white/15 text-white text-sm font-sans transition-all duration-300"
    >
      <i id="toast-icon" class="fa-solid fa-check text-green-400 text-xs"></i>
      <span id="toast-msg"></span>
    </div>

    <script>
      const euId = "eu";

      const desenvolvedores = [
        {
          id: 1,
          nome: "Junin",
          iniciais: "JN",
          cor: "#1e3a5f",
          bio: "Programação avançada absurda 🔥🔥🔥",
          tecnologias: ["React", "TypeScript", "Node.js", "Figma"],
          github: "junincraft",
          contatos: 142,
          adicionado: false,
        },
        {
          id: 2,
          nome: "Pedro Carvalho",
          iniciais: "PC",
          cor: "#1a3a2a",
          bio: "Backend engineer. Amo Python e automação. Sempre aprendendo algo novo.",
          tecnologias: ["Python", "Django", "PostgreSQL", "Docker"],
          github: "pedrocarv",
          contatos: 89,
          adicionado: false,
        },
        {
          id: 3,
          nome: "Carla Mendes",
          iniciais: "CM",
          cor: "#3b1f5e",
          bio: "Java dev sênior. Foco em arquitetura de microsserviços e performance.",
          tecnologias: ["Java", "Spring Boot", "Kafka", "AWS"],
          github: "carlamendes",
          contatos: 310,
          adicionado: true,
        },
        {
          id: 4,
          nome: "Lucas Ferreira",
          iniciais: "LF",
          cor: "#3b2a00",
          bio: "Fullstack com Vue e Laravel. Curto criar SaaS e projetos indie.",
          tecnologias: ["Vue.js", "Laravel", "MySQL", "Tailwind"],
          github: "lucasferr",
          contatos: 57,
          adicionado: false,
        },
        {
          id: 5,
          nome: "Marina Costa",
          iniciais: "MC",
          cor: "#3b1a1a",
          bio: "Designer-dev. Uno Figma com código para criar interfaces memoráveis.",
          tecnologias: ["Figma", "CSS", "React", "GSAP"],
          github: "marinacosta",
          contatos: 203,
          adicionado: false,
        },
        {
          id: 6,
          nome: "Rafael Nunes",
          iniciais: "RN",
          cor: "#1a2a3b",
          bio: "DevOps e SRE. K8s, Terraform e pipelines CI/CD são meu dia a dia.",
          tecnologias: ["Kubernetes", "Docker", "Terraform", "Go"],
          github: "rafaelnunes",
          contatos: 178,
          adicionado: false,
        },
        {
          id: 7,
          nome: "Julia Rocha",
          iniciais: "JR",
          cor: "#2a1a3b",
          bio: "Mobile dev com foco em React Native. Já publiquei 4 apps na Play Store.",
          tecnologias: ["React Native", "Expo", "Firebase", "TypeScript"],
          github: "juliarocha",
          contatos: 95,
          adicionado: false,
        },
        {
          id: 8,
          nome: "Bruno Alves",
          iniciais: "BA",
          cor: "#1a3a1a",
          bio: "Data engineer e entusiasta de ML. Python + Spark para pipelines de dados.",
          tecnologias: ["Python", "Spark", "dbt", "Airflow"],
          github: "brunoalves",
          contatos: 64,
          adicionado: false,
        },
        {
          id: 9,
          nome: "Fernanda Lima",
          iniciais: "FL",
          cor: "#3b1a2a",
          bio: "Especialista em segurança ofensiva e CTF. Hacking ético e pentesting.",
          tecnologias: ["Python", "Bash", "Kali Linux", "Burp Suite"],
          github: "fernandalima",
          contatos: 120,
          adicionado: false,
        },
        {
          id: 10,
          nome: "Israelly Lorrany",
          iniciais: "IL",
          cor: "#5e1a3b",
          bio: "Desenvolvedora apaixonada por front-end e design de interfaces. Crochê e código andam juntos! 🧶",
          tecnologias: ["HTML", "CSS", "JavaScript", "Figma"],
          github: "israellylorrany",
          contatos: 47,
          adicionado: false,
        },
      ];

      const todasTecnologias = [
        ...new Set(desenvolvedores.flatMap((d) => d.tecnologias)),
      ].sort();

      let filtrosAtivos = new Set();
      let termoBusca = "";

      function renderFiltros() {
        const container = document.getElementById("filtros");
        container.innerHTML = "";

        todasTecnologias.forEach((tech) => {
          const ativo = filtrosAtivos.has(tech);
          const btn = document.createElement("button");
          btn.textContent = tech;
          btn.onclick = () => toggleFiltro(tech);
          btn.className = [
            "font-mono text-xs px-2.5 py-1 rounded-lg border cursor-pointer transition-all duration-150",
            ativo
              ? "bg-red-500/20 border-red-500/50 text-red-300"
              : "bg-white/5 border-white/10 text-white/40 hover:border-white/25 hover:text-white/70",
          ].join(" ");
          container.appendChild(btn);
        });
      }

      function toggleFiltro(tech) {
        if (filtrosAtivos.has(tech)) {
          filtrosAtivos.delete(tech);
        } else {
          filtrosAtivos.add(tech);
        }
        document
          .getElementById("limpar-filtros")
          .classList.toggle("hidden", filtrosAtivos.size === 0);
        renderFiltros();
        aplicarFiltros();
      }

      function limparFiltros() {
        filtrosAtivos.clear();
        document.getElementById("limpar-filtros").classList.add("hidden");
        renderFiltros();
        aplicarFiltros();
      }

      function aplicarFiltros() {
        const ordenar = document.getElementById("ordenar").value;

        let lista = desenvolvedores.filter((d) => {
          const matchNome = d.nome.toLowerCase().includes(termoBusca);
          const matchTech = d.tecnologias.some((t) =>
            t.toLowerCase().includes(termoBusca),
          );
          const matchBusca = matchNome || matchTech;

          const matchFiltro =
            filtrosAtivos.size === 0 ||
            [...filtrosAtivos].every((f) => d.tecnologias.includes(f));

          return matchBusca && matchFiltro;
        });

        if (ordenar === "contatos")
          lista.sort((a, b) => b.contatos - a.contatos);
        else if (ordenar === "recente") lista.sort((a, b) => b.id - a.id);
        else lista.sort((a, b) => a.nome.localeCompare(b.nome));

        renderCards(lista);
      }

      function renderCards(lista) {
        const grid = document.getElementById("devs-grid");
        const empty = document.getElementById("empty-state");
        const count = document.getElementById("resultado-count");

        grid.innerHTML = "";

        count.textContent = `${lista.length} desenvolvedor${lista.length !== 1 ? "es" : ""} encontrado${lista.length !== 1 ? "s" : ""}`;

        if (lista.length === 0) {
          empty.classList.remove("hidden");
          empty.classList.add("flex");
          return;
        }

        empty.classList.add("hidden");
        empty.classList.remove("flex");

        lista.forEach((dev) => {
          const card = document.createElement("div");
          card.className = [
            "flex flex-col gap-4 p-5 rounded-2xl border transition-all duration-200",
            "bg-white/[0.03] border-white/[0.07] hover:border-white/15 hover:bg-white/[0.05]",
          ].join(" ");

          const btnClasses = dev.adicionado
            ? "flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-mono font-medium cursor-pointer transition-all duration-150 bg-white/5 border border-white/10 text-white/40 hover:bg-red-500/10 hover:border-red-500/30 hover:text-red-400"
            : "flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-mono font-medium cursor-pointer transition-all duration-150 bg-red-500/15 border border-red-500/30 text-red-400 hover:bg-red-500/25";

          const btnIcone = dev.adicionado ? "fa-user-check" : "fa-user-plus";
          const btnTexto = dev.adicionado ? "adicionado" : "adicionar";

          card.innerHTML = `
            <!-- Linha superior: avatar + nome + botão -->
            <div class="flex items-start justify-between gap-3">
              <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-full flex items-center justify-center shrink-0
                            font-mono text-sm font-semibold border"
                     style="background:${dev.cor}25; color:${dev.cor}; border-color:${dev.cor}40">
                  ${dev.iniciais}
                </div>
                <div>
                  <p class="text-white font-semibold text-sm">${dev.nome}</p>
                  <a href="https://github.com/${dev.github}" target="_blank"
                     class="font-mono text-[11px] text-white/25 hover:text-white/50 transition-colors">
                    @${dev.github}
                  </a>
                </div>
              </div>
              <button
                class="${btnClasses}"
                onclick="toggleAdicionar(${dev.id}, this)"
                data-id="${dev.id}">
                <i class="fa-solid ${btnIcone} text-[10px]"></i>
                ${btnTexto}
              </button>
            </div>

            <!-- Bio -->
            <p class="text-white/45 text-xs leading-relaxed line-clamp-2">${dev.bio}</p>

            <!-- Tecnologias -->
            <div class="flex flex-wrap gap-1.5">
              ${dev.tecnologias
                .map((t) => {
                  const ativa = filtrosAtivos.has(t);
                  return `<span
                  class="font-mono text-[10px] px-2 py-0.5 rounded-md border cursor-pointer transition-colors
                         ${
                           ativa
                             ? "bg-red-500/15 border-red-500/30 text-red-400"
                             : "bg-white/5 border-white/10 text-white/35 hover:border-white/20 hover:text-white/60"
                         }"
                  onclick="toggleFiltro('${t}')">
                  ${t}
                </span>`;
                })
                .join("")}
            </div>

            <!-- Rodapé: contatos -->
            <div class="flex items-center justify-between pt-1 border-t border-white/5">
              <div class="flex items-center gap-1.5 text-white/25">
                <i class="fa-solid fa-users text-[10px]"></i>
                <span class="font-mono text-[11px]">${dev.contatos} conexões</span>
              </div>
            </div>
          `;

          grid.appendChild(card);
        });
      }

      function toggleAdicionar(id, btn) {
        const dev = desenvolvedores.find((d) => d.id === id);
        if (!dev) return;

        dev.adicionado = !dev.adicionado;

        if (dev.adicionado) {
          btn.className =
            "flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-mono font-medium cursor-pointer transition-all duration-150 bg-white/5 border border-white/10 text-white/40 hover:bg-red-500/10 hover:border-red-500/30 hover:text-red-400";
          btn.innerHTML = `<i class="fa-solid fa-user-check text-[10px]"></i> adicionado`;
          mostrarToast(`${dev.nome} adicionado aos contatos!`, "check");
        } else {
          btn.className =
            "flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-mono font-medium cursor-pointer transition-all duration-150 bg-red-500/15 border border-red-500/30 text-red-400 hover:bg-red-500/25";
          btn.innerHTML = `<i class="fa-solid fa-user-plus text-[10px]"></i> adicionar`;
          mostrarToast(`${dev.nome} removido dos contatos.`, "minus");
        }
      }

      let toastTimer = null;

      function mostrarToast(msg, tipo) {
        const toast = document.getElementById("toast");
        const icon = document.getElementById("toast-icon");
        document.getElementById("toast-msg").textContent = msg;

        icon.className =
          tipo === "check"
            ? "fa-solid fa-check text-green-400 text-xs"
            : "fa-solid fa-minus text-white/40 text-xs";

        toast.classList.remove(
          "opacity-0",
          "pointer-events-none",
          "-translate-y-2",
        );
        toast.classList.add("opacity-100", "translate-y-0");

        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.classList.add(
            "opacity-0",
            "pointer-events-none",
            "-translate-y-2",
          );
          toast.classList.remove("opacity-100", "translate-y-0");
        }, 2500);
      }

      document
        .getElementById("search-input")
        .addEventListener("input", function () {
          termoBusca = this.value.toLowerCase().trim();
          document
            .getElementById("clear-btn")
            .classList.toggle("hidden", termoBusca === "");
          aplicarFiltros();
        });

      function limparBusca() {
        termoBusca = "";
        document.getElementById("search-input").value = "";
        document.getElementById("clear-btn").classList.add("hidden");
        aplicarFiltros();
      }

      renderFiltros();
      aplicarFiltros();
    </script>
  </body>
</html>
